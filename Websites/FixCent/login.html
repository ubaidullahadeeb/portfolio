<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FIXO | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
        body {
            background: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        .auth-card {
            max-width: 420px;
            margin: 80px auto;
            text-align: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .logo img {
            width: 40px;
        }

        .btn-dark {
            border-radius: 6px;
            padding: 12px;
        }

        .btn-light {
            background: #fff3df;
            border: none;
            padding: 12px;
            border-radius: 6px;
        }

        input {
            padding: 12px;
        }
    </style>
<body>
    <div class="container">
    <div class="auth-card">
        <div class="logo mb-3">
            <img src="images/Group 253.png" alt="FIXO">
        </div>

        <h6 class="fw-bold">Home & Commercial</h6>
        <p class="text-muted mb-4">Maintenance</p>

        <div class="mb-3 text-start">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" placeholder="Enter your phone number">
        </div>

        <a href="index.html" class="nav-link"><button class="btn btn-dark w-100 mb-3">Login</button></a>

        <p class="mb-2">Don't have an <a href="register.html">account?</a></p>

        <a href="register.html" class="btn btn-light w-100">Register</a>
    </div>
    </div>

</body>

</html>
