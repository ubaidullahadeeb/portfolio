<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>FIXO | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<style>
  body {
    background: #ffffff;
    font-family: 'Segoe UI', sans-serif;
  }

  .auth-card {
    max-width: 460px;
    margin: 60px auto;
  }

  .btn-dark {
    border-radius: 6px;
    padding: 12px;
  }

  .btn-light {
    background: #fff3df;
    border: none;
    padding: 12px;
    border-radius: 6px;
  }

  .gender-btn {
    border: 1px solid #ddd;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .gender-btn.active {
    background: #000;
    color: #fff;
  }

  .logo {
    width: 70px;
    height: 70px;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 8px 20px rgba(0, 0, 0, .1);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
  }

  .logo img {
    width: 40px;
  }
</style>

<body>
  <div class="container">
    <div class="auth-card">
      <center>
        <div class="logo mb-3">
          <img src="images/Group 253.png" alt="FIXO">
        </div>
        <h6 class="text-muted">Registration</h6>
        <h2 class="fw-bold mb-4">Create a free<br>account</h2>
      </center>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your Name">
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" class="form-control" placeholder="Enter your phone number">
      </div>

      <div class="mb-3">
        <label class="form-label">Email for invoices</label>
        <input type="email" class="form-control" placeholder="Enter your email (Optional)">
      </div>

      <label class="form-label">Select your Gender</label>
      <div class="d-flex gap-2 mb-4">
        <div class="gender-btn w-100 text-center" onclick="selectGender(this)">Male</div>
        <div class="gender-btn w-100 text-center" onclick="selectGender(this)">Female</div>
        <div class="gender-btn w-100 text-center" onclick="selectGender(this)">Other</div>
      </div>

      <a href="login.html" class="nav-link"><button class="btn btn-dark w-100 mb-3">Register</button></a>

      <p class="text-center mb-2">Already have an <a href="login.html">account?</a></p>

      <a href="login.html" class="btn btn-light w-100">Login</a>
    </div>
  </div>
  <script>
    function selectGender(el) {
      document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
    }
  </script>

</body>

</html>
